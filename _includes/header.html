<header class="header">

	<div class="wrap">

		{% if site.data.settings.header_settings.logo_image %}
		<a href="{{ site.baseurl }}/" class="header__logo">
			<img src="{{ site.data.settings.header_settings.logo_image | relative_url }}" class="header__logo__img" alt="{{ site.data.settings.basic_settings.site_title }}">
		</a>
		{% else %}
		<a href="{{ site.baseurl }}/" class="header__title">
			{{ site.data.settings.basic_settings.site_title }}
		</a>
		{% endif %}

		<div class="menu">
			<button class="menu__toggle js-menu-toggle" aria-label="Toggle menu" aria-expanded="false">
				<div class="menu__toggle__icon">
					<span></span>
					<span></span>
					<span></span>
				</div>
			</button>
			<nav class="menu__wrap" role="navigation">
				<ul class="menu__list">
					{% for item in site.data.settings.menu_items %}
					<li class="menu__list__item">
						<a href="{{ item.url | relative_url }}" class="menu__list__item__link">{{ item.title }}</a>
					</li>
					{% endfor %}
				</ul>
			</nav>
		</div>

	</div>

</header>
