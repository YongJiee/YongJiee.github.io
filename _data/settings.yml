advanced_settings:
  ajax_loading: false
  footer_js: |
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('contactForm');
      const successMessage = document.getElementById('successMessage');
      const errorMessage = document.getElementById('errorMessage');

      if (form) {
        // Prevent zoom on input focus (iOS)
        const inputs = form.querySelectorAll('input, textarea');
        inputs.forEach(input => {
          input.addEventListener('focus', function() {
            if (window.innerWidth < 768) {
              // Prevent zoom by ensuring font-size is 16px or larger
              this.style.fontSize = '16px';
            }
          });
        });

        form.addEventListener('submit', function(e) {
          e.preventDefault();

          // Get form elements
          const name = document.getElementById('name').value.trim();
          const email = document.querySelector('input[name="_replyto"]').value.trim();
          const message = document.getElementById('message').value.trim();
          const submitBtn = form.querySelector('.submit-btn');

          // Hide previous messages
          successMessage.style.display = 'none';
          errorMessage.style.display = 'none';

          // Validate form
          if (!name || !email || !message) {
            showError('Please fill in all fields.');
            // Haptic feedback on mobile (if supported)
            if (navigator.vibrate) {
              navigator.vibrate(200);
            }
            return;
          }

          // Email validation
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRegex.test(email)) {
            showError('Please enter a valid email address.');
            if (navigator.vibrate) {
              navigator.vibrate(200);
            }
            return;
          }

          // Show loading state
          setButtonState('loading');
          form.classList.add('sending');

          // Blur active element to hide keyboard on mobile
          if (document.activeElement) {
            document.activeElement.blur();
          }

          // Prepare form data
          const formData = new FormData(form);

          // Submit to Formspree
          fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: {
              'Accept': 'application/json'
            }
          })
          .then(response => {
            if (response.ok) {
              return response.json();
            }
            throw new Error('Network response was not ok');
          })
          .then(data => {
            // Success
            setButtonState('success');
            form.classList.remove('sending');
            successMessage.style.display = 'flex';
            form.reset();

            // Success haptic feedback
            if (navigator.vibrate) {
              navigator.vibrate([50, 100, 50]);
            }

            // Reset button after delay
            setTimeout(() => {
              setButtonState('default');
              successMessage.style.display = 'none';
            }, 5000);
          })
          .catch(error => {
            console.error('Error:', error);
            setButtonState('error');
            form.classList.remove('sending');
            showError('There was an error sending your message. Please try again or contact me directly via email.');

            // Error haptic feedback
            if (navigator.vibrate) {
              navigator.vibrate([100, 50, 100]);
            }

            // Reset button after delay
            setTimeout(() => {
              setButtonState('default');
            }, 3000);
          });
        });

        function setButtonState(state) {
          const submitBtn = form.querySelector('.submit-btn');
          const btnText = submitBtn.querySelector('.btn-text');

          // Remove all state classes
          submitBtn.classList.remove('loading', 'success', 'error');
          submitBtn.disabled = false;

          switch(state) {
            case 'loading':
              submitBtn.classList.add('loading');
              submitBtn.disabled = true;
              if (btnText) btnText.textContent = 'Sending...';
              break;

            case 'success':
              submitBtn.classList.add('success');
              if (btnText) btnText.textContent = 'Message Sent!';
              break;

            case 'error':
              submitBtn.classList.add('error');
              if (btnText) btnText.textContent = 'Try Again';
              break;

            case 'default':
            default:
              if (btnText) btnText.textContent = 'Send Message';
              break;
          }
        }

        function showError(message) {
          errorMessage.querySelector('p').textContent = message;
          errorMessage.style.display = 'flex';

          // Auto-hide after 5 seconds
          setTimeout(() => {
            errorMessage.style.display = 'none';
          }, 5000);

          // Scroll to error message (smooth on desktop, instant on mobile for better UX)
          const scrollBehavior = window.innerWidth < 768 ? 'auto' : 'smooth';
          errorMessage.scrollIntoView({
            behavior: scrollBehavior,
            block: 'center'
          });
        }
      }

      // Lazy load images for better performance
      if ('IntersectionObserver' in window) {
        const imageObserver = new IntersectionObserver((entries, observer) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const img = entry.target;
              if (img.dataset.src) {
                img.src = img.dataset.src;
                img.removeAttribute('data-src');
                imageObserver.unobserve(img);
              }
            }
          });
        });

        document.querySelectorAll('img[data-src]').forEach(img => {
          imageObserver.observe(img);
        });
      }
    });
    </script>
