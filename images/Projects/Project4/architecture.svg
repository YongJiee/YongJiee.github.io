<svg width="680" height="500" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:system-ui,sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Pi container -->
  <rect x="30" y="30" width="260" height="200" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="160" y="54" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Raspberry Pi 4</text>
  <text x="160" y="72" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">192.168.10.2</text>

  <!-- Cameras node -->
  <rect x="55" y="90" width="210" height="52" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="160" y="111" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">3× IMX708 cameras</text>
  <text x="160" y="129" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Arducam mux · sequential</text>

  <!-- multi_camera_publisher -->
  <rect x="55" y="165" width="210" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="160" y="183" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">multi_camera_publisher</text>
  <text x="160" y="199" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Picamera2 · ROS2 pub</text>

  <!-- Arrow cameras → publisher -->
  <line x1="160" y1="142" x2="160" y2="163" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Ethernet arrow -->
  <line x1="265" y1="187" x2="355" y2="187" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="310" y="178" text-anchor="middle" font-size="12" fill="#0F6E56">ethernet</text>
  <text x="310" y="200" text-anchor="middle" font-size="12" fill="#0F6E56">/image_raw</text>

  <!-- WSL container -->
  <rect x="360" y="30" width="290" height="440" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="505" y="54" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C">WSL Ubuntu</text>
  <text x="505" y="72" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">192.168.10.1</text>

  <!-- ocr_node -->
  <rect x="383" y="90" width="244" height="52" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="505" y="111" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C">ocr_node</text>
  <text x="505" y="129" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Tesseract · pyzbar · OpenCV</text>

  <!-- Arrow: ethernet → ocr_node -->
  <line x1="505" y1="165" x2="505" y2="144" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="523" y="158" font-size="12" fill="#534AB7">/ocr_result</text>

  <!-- database_matcher_node -->
  <rect x="383" y="180" width="244" height="52" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="505" y="201" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C">database_matcher_node</text>
  <text x="505" y="219" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">SmartMatcher · thefuzz</text>

  <!-- Arrow: ocr → matcher -->
  <line x1="505" y1="142" x2="505" y2="178" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- database_manager -->
  <rect x="383" y="265" width="244" height="52" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text x="505" y="286" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4A1B0C">database_manager</text>
  <text x="505" y="304" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">SQLite · product passport</text>

  <!-- Arrow: matcher → db_manager -->
  <line x1="505" y1="232" x2="505" y2="263" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="523" y="252" font-size="12" fill="#993C1D">/match_result</text>

  <!-- robot_command_node -->
  <rect x="383" y="350" width="244" height="52" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text x="505" y="371" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4A1B0C">robot_command_node</text>
  <text x="505" y="389" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">pass/fail · /robot_command</text>

  <!-- Arrow: db_manager → robot_command -->
  <line x1="505" y1="317" x2="505" y2="348" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Trigger capture feedback -->
  <path d="M383 376 L160 376 L160 211" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="268" y="393" text-anchor="middle" font-size="12" fill="#5F5E5A">/trigger_capture</text>

  <!-- Legend -->
  <rect x="30" y="450" width="12" height="12" rx="2" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="48" y="461" dominant-baseline="central" font-size="12" fill="#444441">Pi hardware</text>
  <rect x="140" y="450" width="12" height="12" rx="2" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="158" y="461" dominant-baseline="central" font-size="12" fill="#444441">WSL processing</text>
  <rect x="270" y="450" width="12" height="12" rx="2" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text x="288" y="461" dominant-baseline="central" font-size="12" fill="#444441">Output / command</text>
</svg>
